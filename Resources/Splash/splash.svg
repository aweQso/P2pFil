<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
	<!-- Renk Geçişleri (Gradients) -->
	<defs>
		<linearGradient id="cyanGradSplash" x1="0%" y1="100%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#06B6D4" />
			<stop offset="100%" stop-color="#22D3EE" />
		</linearGradient>
		<linearGradient id="emeraldGradSplash" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#10B981" />
			<stop offset="100%" stop-color="#34D399" />
		</linearGradient>
	</defs>

	<!-- Tam Ortalanmış P2P Logo Grubu (Arka plansız/Şeffaf) -->
	<g transform="translate(26, 16)">
		<!-- Sol Alt Giden Akış / Alıcı Kısmı (Cyan) -->
		<path d="M 160,340 
             L 300,340 
             C 320,340 330,330 330,310 
             L 330,220"
			  fill="none"
			  stroke="url(#cyanGradSplash)"
			  stroke-width="36"
			  stroke-linecap="round"
			  stroke-linejoin="round"/>

		<!-- Sağ Üst Gelen Akış / Dosya Kıvrımı ve Gönderici (Emerald) -->
		<path d="M 300,140 
             L 160,140 
             C 140,140 130,150 130,170 
             L 130,260"
			  fill="none"
			  stroke="url(#emeraldGradSplash)"
			  stroke-width="36"
			  stroke-linecap="round"
			  stroke-linejoin="round"/>

		<!-- Dinamik P2P Bağlantı Noktaları -->
		<circle cx="130" cy="300" r="26" fill="url(#cyanGradSplash)" />
		<circle cx="330" cy="180" r="26" fill="url(#emeraldGradSplash)" />

		<!-- Merkezdeki Okların İç Rengi (Arka plan rengimiz olan Koyu Lacivert #0F172A ile maskelendi) -->
		<path d="M 210,322 L 230,340 L 210,358" fill="none" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
		<path d="M 250,158 L 230,140 L 250,122" fill="none" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
	</g>
</svg>
