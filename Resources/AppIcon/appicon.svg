<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
	<!-- Modern Yumuşatılmış Köşeli Arka Plan (Squircle) -->
	<rect width="512" height="512" rx="140" fill="#0F172A"/>

	<!-- Renk Geçişleri (Gradients) -->
	<defs>
		<linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
			<stop offset="0%" stop-color="#06B6D4" />
			<stop offset="100%" stop-color="#22D3EE" />
		</linearGradient>
		<linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
			<stop offset="0%" stop-color="#10B981" />
			<stop offset="100%" stop-color="#34D399" />
		</linearGradient>
	</defs>

	<!-- P2P Transfer ve Dosya Silueti Oluşturan Geometrik Yapı -->
	<g transform="translate(26, 16)">
		<!-- Sol Alt Giden Akış / Alıcı Kısmı (Cyan) -->
		<path d="M 160,340 
             L 300,340 
             C 320,340 330,330 330,310 
             L 330,220"
			  fill="none"
			  stroke="url(#cyanGrad)"
			  stroke-width="36"
			  stroke-linecap="round"
			  stroke-linejoin="round"/>

		<!-- Sağ Üst Gelen Akış / Dosya Kıvrımı ve Gönderici (Emerald) -->
		<path d="M 300,140 
             L 160,140 
             C 140,140 130,150 130,170 
             L 130,260"
			  fill="none"
			  stroke="url(#emeraldGrad)"
			  stroke-width="36"
			  stroke-linecap="round"
			  stroke-linejoin="round"/>

		<!-- Dinamik P2P Bağlantı Noktaları (Glow Efektli Node'lar) -->
		<circle cx="130" cy="300" r="26" fill="url(#cyanGrad)" />
		<circle cx="330" cy="180" r="26" fill="url(#emeraldGrad)" />

		<!-- Merkezdeki Transfer Yönü Göstergesi (Minimal Ok Başları) -->
		<path d="M 210,322 L 230,340 L 210,358" fill="none" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
		<path d="M 250,158 L 230,140 L 250,122" fill="none" stroke="#0F172A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
	</g>
</svg>
